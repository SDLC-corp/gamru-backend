# ─────────────────────────────────────────────────────────────────────
# Render Blueprint — Gamru Engage backend
# Docs: https://render.com/docs/blueprint-spec
#
# This file lives at the repo root for `gamru-backend`. Render reads it
# when you create a "Blueprint" from this repository.
#
# IMPORTANT — first-time setup:
#   1. Push this repo to GitHub/GitLab.
#   2. In Render dashboard: New + → Blueprint → pick this repo.
#   3. Fill in every env var below that is marked `sync: false`
#      (database creds, JWT secrets, mail SMTP creds).
#   4. Add a managed Postgres database in Render (or use Aiven/Neon/etc.)
#      and copy its host/port/user/password/name into the DB_* vars.
#
# WHY `npm run build` + `npm start` (matches Render's standard
# "Build Command / Start Command" pattern):
#   • `npm run build`  →  package.json: `tsc && cpSync(templates)`
#                         compiles src/*.ts  →  dist/*.js
#                         and copies src/templates/*.html → dist/templates/
#   • `npm start`      →  package.json: `node dist/server.js`
#
# DO NOT use `node src/server.ts` as the start command —
# Node.js cannot execute TypeScript files directly; you'll get
# "Unknown file extension .ts" and the deploy will crash.
#
# NOTES:
#   • Render auto-injects PORT for web services — do NOT hardcode it.
#     The app already reads `process.env.PORT || 5000`.
#   • `npm ci` on Render installs devDependencies too, so `tsc` and
#     `sequelize-cli` are available during build.
#   • DB migrations run inside buildCommand so they execute on every
#     deploy regardless of plan tier (preDeployCommand needs a paid
#     plan). Sequelize tracks applied migrations in SequelizeMeta, so
#     re-running is safe / idempotent.
#   • Render's free-tier disk is ephemeral — files under `uploads/`
#     will NOT survive a redeploy. For persistent uploads, mount a
#     disk (paid plan) or move media to S3 / R2 / Cloudinary.
# ─────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: gamru-backend
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true

    # 1) install deps  2) compile TS + copy email templates  3) run migrations
    buildCommand: >-
      npm ci &&
      npm run build &&
      npx sequelize-cli db:migrate

    # Runs the compiled JS from dist/ (package.json: "start": "node dist/server.js")
    startCommand: npm start

    healthCheckPath: /api/health

    envVars:
      # ── Runtime ────────────────────────────────────────────────────
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      # PORT: intentionally omitted — Render assigns it automatically.

      # ── Database (set these in the Render dashboard) ───────────────
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      # SSL is auto-enabled for non-localhost hosts in src/config/db.ts,
      # but we force it on here so cloud Postgres (Aiven/Neon/Render PG)
      # never connects in plaintext.
      - key: DB_SSL
        value: "true"

      # ── Auth / JWT ────────────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d

      # ── Mail / SMTP (Nodemailer) ──────────────────────────────────
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
